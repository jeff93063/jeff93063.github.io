<script src="papaparse.min.js"></script>
<script>

// Papa.parse("https://jeff93063.github.io/oney/oney.csv", {
Papa.parse("./oney.csv", {
	download: true,
	complete: function(results) {
		let r = Math.floor(Math.random() * (results.data.length-1) + 1);
		document.getElementById("videotitle").innerHTML=results.data[r][1];
		window.location.href=results.data[r][0];
		// window.close();
	}
});

</script>
<h1 id="videotitle"></h1>
