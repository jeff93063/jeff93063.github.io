html {
	height:100%;
	font-family:sans;
	font-size:min(7.5vw, 8vh);
}
body {
	background-color:#4D5359;
	color:white;
	height:100%;
	margin:0;
	padding:0;
}
div#gridContainer {
	display:grid;
	gap:.5rem;
	position:absolute;
	top:50%;
	transform: translateY(-50%);
	left:0px;
	right:0px;
	grid-template-rows: auto auto;
}

div#controls {
	display:inline;
	text-align:center;
	text-wrap:nowrap;
	margin:0;
	padding:0;
}
select {
	background-color:#000000;
	color:#ffffff;
	min-width:2rem;
	border:0px;
	border-radius:.5rem;
	padding:.5rem;
	/* fixes problem where neutralinojs shows SELECT elements with a native-looking overlay and ignores css background color */
	appearance:unset;
	padding-right:1rem;
	background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
	background-repeat: no-repeat;
	background-position-x: 100%;
	background-position-y: 50%;
	font-size: 1rem;
}
div#output {
	font-size:.8rem;
}
table {
	border-collapse:collapse;
	margin-left:auto;
	margin-right:auto;
}
th, td {
/* 	border:1px solid white; */
	padding:.2rem;
}
th {
	font-weight:900;
	font-size:.5rem;
	text-align:right;
	border-right:2px solid white;
}

function setCookie(name,value,days) { //https://stackoverflow.com/questions/14573223/set-cookie-and-get-cookie-with-javascript
	console.log("cookie name=" + name + " value=" + value + " days=" + days);
	var expires = "";
	if (days) {
		var date = new Date();
		date.setTime(date.getTime() + (days*24*60*60*1000));
		expires = "; expires=" + date.toUTCString();
	}
	document.cookie = name + "=" + (value || "")  + expires + "; path=/; SameSite=Strict";
}
function getCookie(name) {
	var nameEQ = name + "=";
	var ca = document.cookie.split(';');
	for(var i=0;i < ca.length;i++) {
		var c = ca[i];
		while (c.charAt(0)==' ') c = c.substring(1,c.length);
		if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
	}
	return null;
}
function eraseCookie(name) {
	document.cookie = name +'=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
}

function onlyUnique(value, index, array) {
	return array.indexOf(value) === index;
}

function selectUnits() {
	if($("inchmetric").value == "inch"){
		activeData = inchData;
		$("prefix").innerHTML = "";
		$("dash").innerHTML = "—";
	}
	else if($("inchmetric").value == "metric"){
		activeData = metricData;
		$("prefix").innerHTML = "M";
		$("dash").innerHTML = "x";
	}
	setCookie("inchmetric",$("inchmetric").value,99);
	initSizeMenu();
}

			if(getCookie("inchmetric") == m.value){
				m.selected = true;
				console.log("set inchmetric from cookie in <select> element");
			}
		}
	}
	selectUnits();
	if(getCookie("size")){
		for(m of $("size").options){
			if(getCookie("size") == m.value){
				m.selected = true;
			}
		}
	}
	if(getCookie("pitch")){
		for(m of $("pitch").options){
			if(getCookie("pitch") == m.value){
				m.selected = true;
			}
		}
	}
}

function initSizeMenu() {
	$("size").innerHTML = "";
	let allSizes = [];
	for(i=0; i<activeData.length; i++){
		allSizes.push(activeData[i][0]);
	}
	let uniqueSizes = allSizes.filter(onlyUnique);
	for(j=0; j<uniqueSizes.length; j++){
		$("size").innerHTML += "<option value='" + uniqueSizes[j] + "'>" + uniqueSizes[j] + "</option>";
	}
	initPitchMenu();
}

function initPitchMenu(){
	$("pitch").innerHTML = "";
	setCookie("size",$("size").value,99);
	for(i=0; i<activeData.length; i++){
		if(activeData[i][0] == $("size").value){
			$("pitch").innerHTML += "<option value='" + activeData[i][1] + "'>" + activeData[i][1] + "</option>";
		}
	}
	selectThread();
}

function check(item){
	if (typeof item !== 'undefined'){
		return item;
	}
	else {
		return "&nbsp;";
	}
}

function selectThread(){
	setCookie("pitch",$("pitch").value,99);
	for(i=0; i<activeData.length; i++){
		if(activeData[i][0] == $("size").value && activeData[i][1] == $("pitch").value){
			let outString = "<table>";
			outString += "<tr><th>Drill Size (Al)</th><td>" + check(activeData[i][2]) + "</td></tr>";
			outString += "<tr><th>Drill Size (Stl)</th><td>" + check(activeData[i][3]) + "</td></tr>";
			outString += "<tr><th>Helicoil Drill (Al)</th><td>" + check(activeData[i][7]) + "</td></tr>";
			outString += "<tr><th>Helicoil Drill (Stl)</th><td>" + check(activeData[i][8]) + "</td></tr>";
			outString += "<tr><th>Clearance Drill (Close)</th><td>" + check(activeData[i][4]) + "</td></tr>";
			outString += "<tr><th>Clearance Drill (Standard)</th><td>" + check(activeData[i][5]) + "</td></tr>";
			outString += "</table>";
			$("output").innerHTML = outString;
		}
	}
}

</script>
</head>
	<body onLoad="initialize();">
		<div id="gridContainer">
			<div id="controls">
				<select id="inchmetric" onChange="selectUnits();">
					<option value="inch">Inch</option>
					<option value="metric">Metric</option>
				</select>
				<span id="prefix"></span><select id="size" onChange="initPitchMenu();"></select><span id="dash">—</span><select id="pitch" onChange="selectThread();"></select>
			</div>
			<div id="output"></div>
		</div>
	</body>
</html>
